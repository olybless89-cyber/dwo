[build]
  base    = "."          # repo root (pnpm workspace)
  command = "pnpm --filter @workspace/tesla-pro run build"
  publish = "artifacts/tesla-pro/dist/public"

[build.environment]
  NODE_VERSION = "20"
  # Set VITE_API_BASE_URL in the Netlify UI → Site settings → Environment variables
  # Example: https://your-api.onrender.com

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
