[build]
  base      = "artifacts/tesla-pro"
  command   = "npm install -g pnpm && pnpm install --frozen-lockfile=false && pnpm run build"
  publish   = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH    = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
